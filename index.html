<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visual DSL Modeler — CASE-средство визуального моделирования систем">
    <title>Visual DSL Modeler | IDE</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="ide-root">

    <a href="#editor" class="ide-root__skip-link">Перейти к редактору</a>

    <div class="ide-container" itemscope itemtype="https://schema.org/SoftwareApplication">
        <meta itemprop="applicationCategory" content="MultimediaApplication">
        <meta itemprop="operatingSystem" content="Windows, Linux, MacOS">

        <header class="ide-header" itemscope itemtype="https://schema.org/Organization">
            <div class="ide-header__logo">
                <img src="images/logo.svg" alt="Visual DSL Modeler" itemprop="logo">
                <h1 class="ide-header__title" itemprop="name">VisualDSL Studio</h1>
            </div>

            <nav class="ide-header__nav" aria-label="Панель инструментов">
                <ul class="ide-toolbar" role="toolbar">
                    <li class="ide-toolbar__item"><button class="ide-btn ide-toolbar__btn--save" type="button">Save</button></li>
                    <li class="ide-toolbar__item"><button class="ide-btn ide-toolbar__btn--run" type="button">Run</button></li>
                    <li class="ide-toolbar__item"><button class="ide-btn ide-toolbar__btn--ai" type="button">AI Fix</button></li>
                </ul>
            </nav>

            <div class="ide-header__meta" itemscope itemtype="https://schema.org/BreadcrumbList">
                <span itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                    <a itemprop="item" href="#"><span itemprop="name">projects</span></a>
                <meta itemprop="position" content="1">
                </span>
                <span class="ide-header__current-file">/ system_v1.udl</span>
            </div>
        </header>

        <div class="ide-workspace">
            <nav class="ide-activity-bar" aria-label="Активности">
                <button class="ide-activity-bar__item ide-activity-bar__item--active" aria-label="Проводник"></button>
                <button class="ide-activity-bar__item" aria-label="Поиск"></button>
                <button class="ide-activity-bar__item" aria-label="Версии"></button>
            </nav>

            <aside class="ide-sidebar">
                <section class="ide-sidebar__section">
                    <h2 class="ide-sidebar__title">EXPLORER</h2>
                    <ul class="ide-tree">
                        <li class="ide-tree__item ide-tree__item--file">system_v1.udl</li>
                        <li class="ide-tree__item ide-tree__item--file">schema.json</li>
                    </ul>
                </section>
            </aside>

            <main class="ide-main" id="editor">
                <section class="ide-panel ide-panel--code" aria-label="Редактор кода">
                    <h3 class="ide-panel__header">EDITOR</h3>
                    <div class="ide-panel__body">
                        <label for="udl-input" class="ide-hidden-label">Код модели</label>
                        <textarea id="udl-input" class="ide-textarea" spellcheck="false">node A "System"</textarea>
                    </div>
                </section>

                <div class="ide-resizer" role="separator"></div>

                <section class="ide-panel ide-panel--preview" aria-label="Визуализация">
                    <h3 class="ide-panel__header">PREVIEW</h3>
                    <div class="ide-panel__body ide-canvas">
                        <figure class="ide-canvas__figure">
                            <img src="images/placeholder.png" alt="Сгенерированная диаграмма" class="ide-canvas__img">
                            <figcaption class="ide-canvas__caption">Визуальная модель процесса</figcaption>
                        </figure>
                    </div>
                </section>

                <section class="ide-terminal" aria-label="Консоль">
                    <div class="ide-terminal__tabs">
                        <button class="ide-terminal__tab ide-terminal__tab--active">Terminal</button>
                        <button class="ide-terminal__tab">Problems</button>
                    </div>
                    <div class="ide-terminal__content">
                        <pre class="ide-terminal__text">Ready</pre>
                    </div>
                </section>
            </main>
        </div>

        <section class="ide-help" itemscope itemtype="https://schema.org/FAQPage">
            <h2 class="ide-help__title">Справка</h2>
            <article itemprop="mainEntity" itemscope itemtype="https://schema.org/Question">
                <h3 itemprop="name">Что такое UDL?</h3>
                <div itemprop="acceptedAnswer" itemscope itemtype="https://schema.org/Answer">
                    <div itemprop="text">Universal Diagram Language для быстрой отрисовки графов.</div>
                </div>
            </article>
        </section>

        <footer class="ide-status-bar" role="contentinfo">
            <div class="ide-status-bar__left">
                <span class="ide-status-item" role="status">main*</span>
                <span class="ide-status-item" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
                    <meta itemprop="price" content="0">
                    <meta itemprop="priceCurrency" content="RUB">
                    Community Edition
                </span>
            </div>
            <div class="ide-status-bar__right">
                <span class="ide-status-item">UTF-8</span>
                <span class="ide-status-item">Ln 1, Col 1</span>
                <span class="ide-status-item ide-status-item--lang">UDL</span>
            </div>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
